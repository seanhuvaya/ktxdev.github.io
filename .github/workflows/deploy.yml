name: Deploy Portfolio to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build to VPS temp folder
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "dist/*"
          target: "~/ktxdev.github.io/deploy_tmp"
          rm: true

      - name: Move build into html and restart container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ~/ktxdev.github.io

            mkdir -p html
            rm -rf html/*
            shopt -s dotglob nullglob

            if [ -d deploy_tmp/dist ]; then
              mv deploy_tmp/dist/* html/
            else
              mv deploy_tmp/* html/
            fi

            rm -rf deploy_tmp

            docker compose restart portfolio
            echo "Deployment complete"
name: Deploy Portfolio to VPS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            echo "Starting deployment..."

            # Go to portfolio directory
            cd ~/ktxdev.github.io

            # Backup current build
            if [ -d "html" ] && [ "$(ls -A html)" ]; then
              cp -r html html-backup-$(date +%Y%m%d-%H%M)
            fi

            # Clear old files and copy new build
            rm -rf html/*
            rsync -av --delete ${{ github.workspace }}/dist/ ./html/

            echo "Files copied successfully"

            # Restart container to apply changes
            docker compose restart portfolio

            echo "Portfolio deployed successfully!"
            echo "Live at: https://yourdomain.com"